<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>TALENT-NET | 赛博人才数据库</title>
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        />
        <link rel="stylesheet" href="/static/css/style.css" />
    </head>
    <body>
        <div class="container">
            <h1 class="text-center mb-4">TALENT-NET 2077</h1>

            <!-- 搜索和上传区域 -->
            <div class="search-bar">
                <div class="input-group">
                    <input
                        type="text"
                        id="searchInput"
                        class="form-control"
                        placeholder="[ 输入代号或邮箱进行搜索 ]"
                    />
                    <button
                        class="btn btn-outline-secondary"
                        type="button"
                        id="searchButton"
                    >
                        扫描
                    </button>
                    <button
                        class="btn btn-primary"
                        type="button"
                        id="uploadButton"
                        data-bs-toggle="modal"
                        data-bs-target="#uploadModal"
                    >
                        上传档案
                    </button>
                </div>
                <div id="searchStatus" class="mt-2"></div>
            </div>

            <!-- 人才卡片网格 -->
            <div class="talent-grid" id="talentGrid">
                <!-- 人才卡片将通过JavaScript填充 -->
            </div>

            <div id="emptyMessage" class="text-center p-5 d-none">
                <p class="fs-5">[ 数据库为空 - 等待初始化 ]</p>
            </div>

            <!-- 上传简历模态框 -->
            <div
                class="modal fade"
                id="uploadModal"
                tabindex="-1"
                aria-labelledby="uploadModalLabel"
                aria-hidden="true"
            >
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title" id="uploadModalLabel">
                                档案上传终端
                            </h5>
                            <button
                                type="button"
                                class="btn-close"
                                data-bs-dismiss="modal"
                                aria-label="Close"
                            ></button>
                        </div>
                        <div class="modal-body">
                            <form
                                id="resumeUploadForm"
                                enctype="multipart/form-data"
                            >
                                <div class="mb-3">
                                    <label for="resumeFile" class="form-label"
                                        >选择档案文件 [PDF格式]</label
                                    >
                                    <input
                                        class="form-control"
                                        type="file"
                                        id="resumeFile"
                                        name="resume"
                                        accept=".pdf"
                                    />
                                </div>
                                <div id="uploadStatus" class="mt-3"></div>
                            </form>
                        </div>
                        <div class="modal-footer">
                            <button
                                type="button"
                                class="btn btn-secondary"
                                data-bs-dismiss="modal"
                            >
                                取消
                            </button>
                            <button
                                type="button"
                                class="btn btn-primary"
                                id="submitUpload"
                            >
                                上传并解析
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 人才详情模态框 -->
            <div
                class="modal fade"
                id="talentModal"
                tabindex="-1"
                aria-labelledby="talentModalLabel"
                aria-hidden="true"
            >
                <div class="modal-dialog modal-lg">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title" id="talentModalLabel">
                                人员档案详情
                            </h5>
                            <button
                                type="button"
                                class="btn-close"
                                data-bs-dismiss="modal"
                                aria-label="Close"
                            ></button>
                        </div>
                        <div class="modal-body" id="talentDetails">
                            <!-- 人才详情将通过JavaScript填充 -->
                        </div>
                        <div class="modal-footer">
                            <button
                                type="button"
                                class="btn btn-secondary"
                                data-bs-dismiss="modal"
                            >
                                关闭
                            </button>
                            <a
                                id="viewResumeBtn"
                                href="#"
                                target="_blank"
                                class="btn btn-primary"
                                >查看完整档案</a
                            >
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 卡片模板 (隐藏) -->
        <template id="talentCardTemplate">
            <div class="card">
                <div class="card-header">
                    <div class="header-content">
                        <div class="name-position-row">
                            <span class="talent-name"></span>
                            <div class="job-position"></div>
                        </div>
                        <div class="score-container">
                            <div class="score-item">
                                <span class="score-label">经验</span>
                                <span
                                    class="score-value experience-score"
                                ></span>
                            </div>
                            <div class="score-item">
                                <span class="score-label">教育</span>
                                <span
                                    class="score-value education-score"
                                ></span>
                            </div>
                            <div class="score-item">
                                <span class="score-label">技术</span>
                                <span
                                    class="score-value technical-score"
                                ></span>
                            </div>
                        </div>
                    </div>
                    <div class="total-score"></div>
                </div>
                <div class="card-content">
                    <div class="info-grid">
                        <div class="info-col">
                            <div class="info-item">
                                <strong>通讯:</strong>
                                <span class="truncated-text phone-text"></span>
                            </div>
                            <div class="info-item">
                                <strong>邮箱:</strong>
                                <span class="truncated-text email-text"></span>
                            </div>
                            <div class="info-item">
                                <strong>教育:</strong>
                                <span
                                    class="truncated-text education-text"
                                ></span>
                            </div>
                            <div class="info-item">
                                <strong>专业:</strong>
                                <span class="truncated-text major-text"></span>
                            </div>
                        </div>
                        <div class="info-col">
                            <div class="info-item">
                                <strong>经验:</strong>
                                <span class="truncated-text years-text"></span>
                            </div>
                            <div class="info-item">
                                <strong>薪资:</strong>
                                <span class="truncated-text salary-text"></span>
                            </div>
                            <div class="info-item">
                                <strong>籍贯:</strong>
                                <span class="truncated-text native-text"></span>
                            </div>
                            <div class="info-item">
                                <strong>目标:</strong>
                                <span class="truncated-text cities-text"></span>
                            </div>
                        </div>
                    </div>
                    <div class="detail-section">
                        <div class="info-item full-width">
                            <strong>技能:</strong>
                            <div
                                class="truncated-text with-hover skills-text"
                            ></div>
                        </div>
                        <div class="info-item full-width">
                            <strong>公司:</strong>
                            <div
                                class="truncated-text with-hover companies-text"
                            ></div>
                        </div>
                        <div class="info-item full-width">
                            <strong>学校:</strong>
                            <div
                                class="truncated-text with-hover universities-text"
                            ></div>
                        </div>
                    </div>
                    <div class="action-buttons">
                        <button class="btn btn-primary view-resume">
                            查看档案
                        </button>
                    </div>
                </div>
            </div>
        </template>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        <script src="/static/js/main.js"></script>
    </body>
</html>
